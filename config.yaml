# ── Noctalia v5 Config — Carbon Dark · Minimal & Functional ──────────────

[shell]
ui_scale              = 1.25
corner_radius_scale   = 1.0
font_family           = "JetBrainsMono Nerd Font"
time_format           = "{:%I:%M %p}"
date_format           = "%a %b %d"
offline_mode          = false
telemetry_enabled     = false
polkit_agent          = true
clipboard_enabled     = true
clipboard_history_max_entries = 50
clipboard_auto_paste  = "auto"

[shell.animation]
enabled = true
speed   = 1.0

[shell.shadow]
direction = "down"
alpha     = 0.45

[shell.panel]
transparency_mode     = "soft"
borders               = true
shadow                = true
launcher_placement       = "floating"
clipboard_placement      = "floating"
control_center_placement = "attached"
wallpaper_placement      = "attached"
session_placement        = "attached"

# ── Wallpaper ───────────────────────────────────────────────────────────

[wallpaper]
enabled             = true
fill_mode           = "crop"
transition          = ["fade"]
transition_duration = 800
edge_smoothness     = 0.3
transition_on_startup = false
directory           = "~/Pictures/Wallpapers"

[wallpaper.default]
path = "/home/luka/.config/banks.jpg"

[wallpaper.automation]
enabled  = false
order    = "random"
recursive = true

# ── Theme ───────────────────────────────────────────────────────────────

[theme]
mode   = "dark"
source = "builtin"
builtin = "Noctalia"

[theme.templates]
enable_builtin_templates = true
builtin_ids           = []
enable_community_templates = false

# ── Notifications ──────────────────────────────────────────────────────

[notification]
enable_daemon      = true
show_app_name      = true
show_actions       = true
layer              = "top"
scale              = 1.0
background_opacity = 0.95
offset_x           = 20
offset_y           = 8

# ── OSD ────────────────────────────────────────────────────────────────

[osd]
position = "top_right"
orientation = "horizontal"
scale = 1.0
background_opacity = 0.95
offset_x = 20
offset_y = 8

[osd.kinds]
volume       = true
brightness   = true
wifi         = true
bluetooth    = true
power_profile = true
caffeine     = true
nightlight   = true
dnd          = true
lock_keys    = true
privacy      = true

# ── Lock Screen ────────────────────────────────────────────────────────

[lockscreen]
enabled         = true
blurred_desktop = false
blur_intensity  = 0.5
tint_intensity  = 0.3

# ── System Monitor ─────────────────────────────────────────────────────

[system.monitor]
enabled = true
cpu_poll_seconds    = 3.0
gpu_poll_seconds    = 5.0
memory_poll_seconds = 3.0
network_poll_seconds = 3.0
disk_poll_seconds   = 10.0

# ── Audio ──────────────────────────────────────────────────────────────

[audio]
enable_overdrive = false
enable_sounds    = false

# ── Brightness ─────────────────────────────────────────────────────────

[brightness]
enable_ddcutil = false

# ── Weather ────────────────────────────────────────────────────────────

[weather]
enabled         = true
refresh_minutes = 30
unit            = "metric"
effects         = true

# ── Bar ────────────────────────────────────────────────────────────────

[bar.main]
position           = "top"
thickness          = 40
background_opacity = 0.0
radius             = 8
padding            = 12
widget_spacing     = 12
scale              = 1.25
shadow             = false
auto_hide          = false
reserve_space      = true
margin_ends        = 16

start  = ["group:left", "group:weather"]
center = ["group:center"]
end    = ["group:right"]

[[bar.main.capsule_group]]
id      = "left"
members = ["workspaces"]
fill    = "surface_variant"
opacity = 0.90
radius  = 8
padding = 8

[[bar.main.capsule_group]]
id      = "weather"
members = ["weather"]
fill    = "surface_variant"
opacity = 0.90
radius  = 8
padding = 8

[[bar.main.capsule_group]]
id      = "center"
members = ["clock"]
fill    = "surface_variant"
opacity = 0.90
radius  = 8
padding = 8

[[bar.main.capsule_group]]
id      = "right"
members = ["bluetooth", "volume", "network", "battery", "session"]
fill    = "surface_variant"
opacity = 0.90
radius  = 8
padding = 8

[widget.clock]
format = "{:%I:%M %p}"
tooltip_format = "{:%A, %B %d, %Y}"

[widget.media]
max_length = 40

[widget.tray]
match_adjacent_spacing = true

[widget.weather]
max_length     = 160
show_condition = true

# ── Dock (disabled for minimalism) ─────────────────────────────────────

[dock]
enabled = false

# ── Idle / Autolock ────────────────────────────────────────────────────

[idle]
pre_action_fade_seconds = 2.0

[idle.behavior.lock]
enabled   = true
timeout   = 240
action    = "lock"

[idle.behavior.screen-off]
enabled   = true
timeout   = 300
action    = "screen_off"
resume_command = "noctalia:dpms-on"

[idle.behavior.lock-and-suspend]
enabled   = true
timeout   = 1200
action    = "lock_and_suspend"

# ── Desktop Widgets (disabled) ─────────────────────────────────────────

[desktop_widgets]
enabled = false

# ── Control Center Shortcuts ──────────────────────────────────────────

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "wallpaper"

[[control_center.shortcuts]]
type = "session"
