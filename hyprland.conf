# ╔══════════════════════════════════════════════════════════════╗
# ║  HYPRLAND CONFIG — ThinkPad X1 Carbon Gen 13 Aura Edition  ║
# ║  Carbon Dark · macOS-feel · Noctalia Shell                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ══════════════════════════════════════════
# MONITORS
# 14" 2.8K (2880×1800) — 2× scale = 1440×900 effective (true Retina)
# Run `hyprctl monitors` to confirm name; on some setups it's eDP-2
# ══════════════════════════════════════════
monitor = eDP-1, 2880x1800@120, 0x0, 1.25    # 1.25× — 2304×1440 effective, good balance
monitor = ,preferred,auto,1          # any external: plug and play


# ══════════════════════════════════════════
# AUTOSTART
# ══════════════════════════════════════════
exec-once = uwsm finalize
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once = hypridle  # replaced by Noctalia built-in idle manager
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Network & Bluetooth managed via Noctalia Control Center
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal-gtk &
exec-once = noctalia


# ══════════════════════════════════════════
# ENVIRONMENT VARIABLES
# ══════════════════════════════════════════
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = GDK_BACKEND, wayland,x11
env = SDL_VIDEODRIVER, wayland
env = MOZ_ENABLE_WAYLAND, 1
env = ELECTRON_OZONE_PLATFORM_HINT, auto
env = LIBVA_DRIVER_NAME, iHD
env = VDPAU_DRIVER, va_gl
env = WLR_RENDERER, vulkan          # Vulkan renderer for wlroots — smoother than GLES2
env = ANV_VIDEO_DECODE, 1           # Vulkan video decode on Intel Arc
env = XDG_SESSION_TYPE, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland
env = GDK_SCALE, 1.25                    # match compositor scale
env = QT_ENABLE_HIGHDPI_SCALING, 1
env = QT_SCREEN_SCALE_FACTORS, eDP-1=1.25


# ══════════════════════════════════════════
# INPUT
# ══════════════════════════════════════════
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0.7
    accel_profile = adaptive
    numlock_by_default = false

    touchpad {
        natural_scroll        = true
        tap-to-click          = true
        tap-and-drag          = true
        drag_lock             = true
        clickfinger_behavior  = true
        middle_button_emulation = false
        scroll_factor         = 0.8
        disable_while_typing  = true
    }

}



# ══════════════════════════════════════════
# CURSOR
# ══════════════════════════════════════════
cursor {
    enable_hyprcursor = false
}


# ══════════════════════════════════════════
# GENERAL
# ══════════════════════════════════════════
general {
    gaps_in  = 6
    gaps_out = 14
    border_size = 1

    # Monochrome — pure grayscale
    col.active_border   = rgba(FFFFFFcc)
    col.inactive_border = rgba(55555588)

    layout = dwindle
    resize_on_border     = true
    hover_icon_on_border = true
    allow_tearing        = false
}


# ══════════════════════════════════════════
# DECORATION — frosted glass + shadows
# ══════════════════════════════════════════
decoration {
    rounding = 8    # matches macOS corner radius exactly

    active_opacity     = 1.0
    inactive_opacity   = 0.97
    fullscreen_opacity = 1.0

    shadow {
        enabled       = true
        range         = 22
        render_power  = 3
        color         = rgba(00000077)
        color_inactive = rgba(00000033)
        offset        = 0, 4
    }

    blur {
        enabled    = true
        size       = 8
        passes     = 3
        noise      = 0.010
        contrast   = 0.90
        brightness = 0.85
        vibrancy   = 0.15
        popups     = true
        popups_ignorealpha = 0.6
        new_optimizations = true
    }
}


# ══════════════════════════════════════════
# ANIMATIONS — macOS Spaces + Mission Control feel
# ══════════════════════════════════════════
animations {
    enabled = yes

    bezier = expo,     0.05, 0.9,  0.1, 1.05
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smooth,   0.25, 1.0,  0.5,  1.0
    bezier = snappy,   0.65, 0.05, 0.35, 0.95
    bezier = linear,   0.0,  0.0,  1.0,  1.0

    animation = windows,            1, 4, expo,    slide
    animation = windowsIn,          1, 4, expo,    slide
    animation = windowsOut,         1, 3, smooth,  slide
    animation = windowsMove,        1, 3, snappy
    animation = border,             1, 5, linear
    animation = fade,               1, 4, smooth
    animation = fadeDim,            1, 4, smooth
    animation = workspaces,         1, 5, overshot, slide
    animation = specialWorkspace,   1, 4, expo,    slidevert
}


# ══════════════════════════════════════════
# LAYOUTS
# ══════════════════════════════════════════
dwindle {
    # pseudotile     = true   # removed in Hyprland 0.55 (was a no-op)
    preserve_split = true
    smart_split    = true
    smart_resizing = true
}

master {
    new_status = master
    mfact      = 0.5
}


# ══════════════════════════════════════════
# GESTURES
# ══════════════════════════════════════════
gestures {
    workspace_swipe_distance   = 280
    workspace_swipe_min_speed_to_force = 25
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true

    gesture = 3, horizontal, workspace
}


# ══════════════════════════════════════════
# MISC
# ══════════════════════════════════════════
misc {
    force_default_wallpaper      = 0
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    enable_swallow               = true
    swallow_regex                = ^(kitty)$
    focus_on_activate            = false
    initial_workspace_tracking    = 2
    # vfr                          = true   # removed in Hyprland 0.55
    vrr                          = 0      # disabled — was causing VRR loop / screen flickering
    # no_direct_scanout            = false  # removed in Hyprland 0.55
}


# ══════════════════════════════════════════
# XWAYLAND — allow scaling
# ══════════════════════════════════════════
xwayland {
    force_zero_scaling = true
}


# ══════════════════════════════════════════
# KEYBINDS
# ══════════════════════════════════════════
$mod         = SUPER
$terminal    = kitty
$browser     = zen-browser
$filemanager = nautilus

# ── Launch ────────────────────────────────────────
# Super+Space = Spotlight (Cmd+Space equivalent) — Noctalia launcher
bind = $mod, Space,  exec, noctalia msg panel-toggle launcher
bind = $mod, Return, exec, $terminal
bind = $mod, E,      exec, $filemanager

# ── Noctalia Shell ────────────────────────────────
bind = $mod,       S, exec, noctalia msg panel-toggle control-center
bind = $mod,       comma, exec, noctalia msg settings-toggle
bind = $mod,       P, exec, noctalia msg panel-toggle session
bind = $mod SHIFT, S, exec, noctalia msg panel-toggle session
bind = $mod,       V, exec, noctalia msg panel-toggle clipboard

# ── Windows ───────────────────────────────────────
bind = $mod,       Q, killactive
bind = $mod SHIFT, Q, exec, hyprctl kill
bind = $mod,       F, fullscreen, 0
bind = $mod SHIFT, F, togglefloating
bind = $mod,       M, pseudo
bind = $mod,       T, layoutmsg, togglesplit

# ── Focus ─────────────────────────────────────────
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = ALT,  Tab,   cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

# ── Move Windows ──────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ── Resize ────────────────────────────────────────
bind = $mod CTRL, H, resizeactive, -50 0
bind = $mod CTRL, L, resizeactive,  50 0
bind = $mod CTRL, K, resizeactive,  0 -50
bind = $mod CTRL, J, resizeactive,  0  50

# ── Workspaces ────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Workspace scroll via mouse and keyboard
bind = $mod, mouse_down,  workspace, e+1
bind = $mod, mouse_up,    workspace, e-1
bind = $mod CTRL, right,  workspace, e+1
bind = $mod CTRL, left,   workspace, e-1

# ── Mouse ─────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Volume & Audio ────────────────────────────────
# Noctalia OSD shows volume overlay automatically via Pipewire
bindel = , XF86AudioRaiseVolume, exec, noctalia msg volume-up
bindel = , XF86AudioLowerVolume, exec, noctalia msg volume-down
bindl  = , XF86AudioMute,    exec, noctalia msg volume-mute
bindl  = , XF86AudioMicMute, exec, noctalia msg mic-mute
bindl  = , XF86AudioPlay,    exec, playerctl play-pause
bindl  = , XF86AudioNext,    exec, playerctl next
bindl  = , XF86AudioPrev,    exec, playerctl previous

# ── Brightness ────────────────────────────────────
# Noctalia OSD shows brightness overlay automatically
bindel = , XF86MonBrightnessUp, exec, noctalia msg brightness-up
bindel = , XF86MonBrightnessDown, exec, noctalia msg brightness-down

# ── Keyboard Backlight ───────────────────────────────
# Cycles: off → low → high → off
bind = , code:235, exec, ~/.local/bin/kbd-backlight-cycle

# ── Screenshots ───────────────────────────────────
bind = ,       Print, exec, grimblast --notify copy area
bind = SHIFT,  Print, exec, grimblast --notify copy screen
bind = $mod,   Print, exec, grimblast --notify copy output
bind = $mod SHIFT, Print, exec, \
  grimblast --notify copysave area ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ── Clipboard (handled by Noctalia panel via Ctrl+V above) ──

# ── Lock & Sleep ──────────────────────────────────
bind = $mod CTRL, L, exec, noctalia msg session lock
bind = $mod CTRL, S, exec, systemctl suspend

# ── Hyprland meta ─────────────────────────────────
bind = $mod SHIFT, R, exec, hyprctl reload && notify-send "Hyprland" "Config reloaded"
bind = $mod SHIFT, E, exit

# ── Battery Saver (moved to terminal command: `media`) ──


# ══════════════════════════════════════════
# WINDOW RULES
# ══════════════════════════════════════════
windowrule = match:class ^(pavucontrol)$, float on, center on, size 820 560
windowrule = match:class ^(blueman-manager)$, float on, center on, size 900 580
windowrule = match:class ^(nm-connection-editor)$, float on, center on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(file-roller)$, float on
windowrule = match:class ^(imv)$, float on
windowrule = match:class ^(mpv)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on

# Terminal: subtle transparency
windowrule = match:class ^(kitty)$, opacity 0.93 0.88

# MPV centered and floating
windowrule = match:class ^(mpv)$, size 1280 720, center on

# PiP — always on top, bottom-right corner
windowrule = match:title ^(Picture-in-Picture)$, pin on, size 480 270, move 100%-490 100%-280

# Assign apps to workspaces
windowrule = match:class ^(firefox)$, workspace 2
windowrule = match:class ^(google-chrome)$, workspace 2


# ══════════════════════════════════════════
# NOCTALIA SHELL INTEGRATION
# ══════════════════════════════════════════

# Persistent workspaces — keeps empty workspaces visible in Noctalia
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

# Layer rules — blur for Noctalia surfaces

