# ╔═════════════════════════════════════╗
# ║  KITTY — Terminal Configuration    ║
# ║  Carbon Dark · Apple system colors ║
# ╚═════════════════════════════════════╝

# ── Font ──────────────────────────────────────────────────────
font_family         JetBrainsMono Nerd Font
bold_font           JetBrainsMono Nerd Font Bold
italic_font         JetBrainsMono Nerd Font Italic
bold_italic_font    JetBrainsMono Nerd Font Bold Italic
font_size           13.0

font_features       JetBrainsMonoNF-Regular +calt +liga
font_features       JetBrainsMonoNF-Bold +calt +liga

# ── Cursor ────────────────────────────────────────────────────
cursor_shape            block
cursor_beam_thickness   2.0
cursor_blink_interval   0

# ── Scrollback ────────────────────────────────────────────────
scrollback_lines        10000
wheel_scroll_multiplier 5.0

# ── Mouse ─────────────────────────────────────────────────────
url_color       #0A84FF
url_style       curly
open_url_with   default
detect_urls     yes
mouse_hide_wait 2.0

# ── Performance ───────────────────────────────────────────────
repaint_delay   8
input_delay     2
sync_to_monitor no

# ── Bell ──────────────────────────────────────────────────────
enable_audio_bell   no
visual_bell_duration 0.0
window_alert_on_bell no

# ── Window ────────────────────────────────────────────────────
remember_window_size    no
initial_window_width    1200
initial_window_height   800
window_padding_width    16
window_padding_height   14
hide_window_decorations yes
background_opacity      0.40

# ── Tab Bar ───────────────────────────────────────────────────
tab_bar_edge            top
tab_bar_margin_height   4 4
tab_bar_style           powerline
tab_powerline_style     round
tab_title_template      "{index}: {title[:22]}"
active_tab_font_style   bold
inactive_tab_font_style normal

# ── COLOR SCHEME: Astrodark ──────────────────────

foreground          #9B9FA9
background          #1A1D23
selection_foreground #1A1D23
selection_background #576176

cursor              #CACCD3
cursor_text_color   #1A1D23
url_color           #50A4E9

# Tab bar
active_tab_foreground   #1A1D23
active_tab_background   #ADB0BB
inactive_tab_foreground #576176
inactive_tab_background #111317
tab_bar_background      #1A1D23

color0  #111317
color8  #576176

color1  #F8747E
color9  #FAA5AB

color2  #75AD47
color10 #A5CD84

color3  #D09214
color11 #EFBD58

color4  #50A4E9
color12 #8DC3F1

color5  #CC83E3
color13 #DEAEED

color6  #00B298
color14 #27FFDF

color7  #ADB0BB
color15 #CACCD3

# Mark highlights
mark1_background #50A4E9
mark1_foreground #1A1D23
mark2_background #F8747E
mark2_foreground #1A1D23
mark3_background #75AD47
mark3_foreground #1A1D23

# ── Key Bindings ──────────────────────────────────────────────
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard

map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+w    close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+1          goto_tab 1
map ctrl+2          goto_tab 2
map ctrl+3          goto_tab 3
map ctrl+4          goto_tab 4
map ctrl+5          goto_tab 5

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+d    close_window
map ctrl+shift+]    next_window
map ctrl+shift+[    previous_window

map ctrl+equal      change_font_size all +1.0
map ctrl+minus      change_font_size all -1.0
map ctrl+0          change_font_size all 0

map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end  scroll_end

map ctrl+backspace   send_text normal \x15

map ctrl+shift+r    load_config_file

# ── Shell integration ─────────────────────────────────────────
shell_integration enabled
